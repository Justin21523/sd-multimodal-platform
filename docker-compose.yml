# docker-compose.yml - Containerized local stack (API + Redis + Celery + optional React)
version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: sd-platform-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: sd-platform-api
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DEVICE: ${DEVICE:-auto}
      AI_MODELS_ROOT: ${AI_MODELS_ROOT:-/mnt/c/ai_models}
      AI_CACHE_ROOT: ${AI_CACHE_ROOT:-/mnt/c/ai_cache}
      AI_OUTPUT_ROOT: ${AI_OUTPUT_ROOT:-/mnt/data/training/runs/sd-multimodal-platform}
    volumes:
      - ${AI_MODELS_ROOT:-/mnt/c/ai_models}:${AI_MODELS_ROOT:-/mnt/c/ai_models}:ro
      - ${AI_CACHE_ROOT:-/mnt/c/ai_cache}:${AI_CACHE_ROOT:-/mnt/c/ai_cache}
      - ${AI_OUTPUT_ROOT:-/mnt/data/training/runs/sd-multimodal-platform}:${AI_OUTPUT_ROOT:-/mnt/data/training/runs/sd-multimodal-platform}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/simple"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  worker-generation:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: sd-platform-worker-generation
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_worker",
        "worker",
        "--loglevel=info",
        "--queues=generation",
        "--concurrency=2",
      ]
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DEVICE: ${DEVICE:-auto}
      CELERY_WORKER_CONCURRENCY: "2"
      AI_MODELS_ROOT: ${AI_MODELS_ROOT:-/mnt/c/ai_models}
      AI_CACHE_ROOT: ${AI_CACHE_ROOT:-/mnt/c/ai_cache}
      AI_OUTPUT_ROOT: ${AI_OUTPUT_ROOT:-/mnt/data/training/runs/sd-multimodal-platform}
    volumes:
      - ${AI_MODELS_ROOT:-/mnt/c/ai_models}:${AI_MODELS_ROOT:-/mnt/c/ai_models}:ro
      - ${AI_CACHE_ROOT:-/mnt/c/ai_cache}:${AI_CACHE_ROOT:-/mnt/c/ai_cache}
      - ${AI_OUTPUT_ROOT:-/mnt/data/training/runs/sd-multimodal-platform}:${AI_OUTPUT_ROOT:-/mnt/data/training/runs/sd-multimodal-platform}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-postprocess:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: sd-platform-worker-postprocess
    command:
      [
        "celery",
        "-A",
        "app.workers.celery_worker",
        "worker",
        "--loglevel=info",
        "--queues=postprocess",
        "--concurrency=1",
      ]
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      DEVICE: ${DEVICE:-auto}
      CELERY_WORKER_CONCURRENCY: "1"
      AI_MODELS_ROOT: ${AI_MODELS_ROOT:-/mnt/c/ai_models}
      AI_CACHE_ROOT: ${AI_CACHE_ROOT:-/mnt/c/ai_cache}
      AI_OUTPUT_ROOT: ${AI_OUTPUT_ROOT:-/mnt/data/training/runs/sd-multimodal-platform}
    volumes:
      - ${AI_MODELS_ROOT:-/mnt/c/ai_models}:${AI_MODELS_ROOT:-/mnt/c/ai_models}:ro
      - ${AI_CACHE_ROOT:-/mnt/c/ai_cache}:${AI_CACHE_ROOT:-/mnt/c/ai_cache}
      - ${AI_OUTPUT_ROOT:-/mnt/data/training/runs/sd-multimodal-platform}:${AI_OUTPUT_ROOT:-/mnt/data/training/runs/sd-multimodal-platform}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: sd-platform-frontend
    working_dir: /frontend
    command: ["sh", "-lc", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend/react:/frontend
      - frontend_node_modules:/frontend/node_modules
    depends_on:
      - api
    restart: unless-stopped
    profiles:
      - frontend

volumes:
  redis_data:
    driver: local
  frontend_node_modules:
    driver: local

